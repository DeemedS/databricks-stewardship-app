{% extends "layout.html" %}

{% block title %}
    <title>Stewardship</title>
{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-3 text-center">Stewardship</h1>
    <p class="text-center text-muted">Production-style stewardship module with dynamic models and CRUD.</p>

    <div class="row mb-3">
        <div class="col-md-6">
            <label for="model-selector" class="form-label">Model/Table</label>
            <select id="model-selector" class="form-select"></select>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div id="dynamic-form" class="row g-2"></div>
            <div class="mt-3 d-flex gap-2 flex-wrap">
                <button id="add-btn" class="btn btn-success">Add</button>
                <button id="edit-btn" class="btn btn-primary">Edit Selected</button>
                <button id="delete-btn" class="btn btn-danger">Delete Selected</button>
                <button id="select-all-btn" class="btn btn-secondary">Select All</button>
                <button id="clear-selection-btn" class="btn btn-outline-secondary">Clear Selection</button>
                <button id="refresh-btn" class="btn btn-outline-primary">Refresh</button>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table id="stewardship-table" class="table table-striped table-bordered align-middle">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>
<script src="/static/stewardship/app.js"></script>
{% endblock %}
