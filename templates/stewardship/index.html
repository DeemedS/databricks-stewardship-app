{% extends "layout.html" %}

{% block title %}
    <title>Stewardship</title>
{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-3 text-center">Stewardship</h1>
    <p class="text-center text-muted">HTMX stewardship CRUD with pagination.</p>

    {% if default_model %}
    <form id="stewardship-form">
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="model-selector" class="form-label">Model/Table</label>
                <select
                    id="model-selector"
                    name="model"
                    class="form-select"
                    hx-get="/api/stewardship/table"
                    hx-target="#table-container"
                    hx-swap="innerHTML"
                    hx-trigger="change"
                >
                    {% for model in models %}
                    <option value="{{ model.name }}" {% if model.name == default_model %}selected{% endif %}>
                        {{ model.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="page-size" class="form-label">Page Size</label>
                <select
                    id="page-size"
                    name="page_size"
                    class="form-select"
                    hx-get="/api/stewardship/table"
                    hx-include="#stewardship-form"
                    hx-target="#table-container"
                    hx-swap="innerHTML"
                    hx-trigger="change"
                >
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <div id="table-container"
             hx-get="/api/stewardship/table"
             hx-include="#stewardship-form"
             hx-trigger="load"
             hx-target="#table-container"
             hx-swap="innerHTML">
        </div>
    </form>
    {% else %}
    <div class="alert alert-warning">No models discovered in the `models` folder.</div>
    {% endif %}
    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>
</div>

<script>
document.body.addEventListener("htmx:afterSwap", function (event) {
    if (event.target.id !== "table-container") return;
    const messageEl = document.querySelector("[data-toast-message]");
    if (!messageEl) return;
    const message = messageEl.getAttribute("data-toast-message");
    const level = messageEl.getAttribute("data-toast-level") || "info";
    if (!message) return;

    const cls = {success:"text-bg-success", warning:"text-bg-warning", error:"text-bg-danger", info:"text-bg-primary"}[level] || "text-bg-primary";
    const id = "toast-" + Date.now();
    const container = document.getElementById("toast-container");
    container.insertAdjacentHTML("beforeend",
      `<div id="${id}" class="toast align-items-center ${cls} border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
      </div>`
    );
    const toastEl = document.getElementById(id);
    const toast = new bootstrap.Toast(toastEl, { delay: 2500 });
    toast.show();
    toastEl.addEventListener("hidden.bs.toast", () => toastEl.remove());
});

function toggleAllRows(source) {
    document.querySelectorAll("input[name='selected_keys']").forEach((checkbox) => {
        checkbox.checked = source.checked;
    });
}
</script>
{% endblock %}
